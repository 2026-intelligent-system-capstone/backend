name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: pressodh/dialearn

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy with Docker Compose
        id: deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/app/dialearn"
            fi

            cd "$DEPLOY_PATH"
            docker compose --env-file .env.docker pull
            docker compose --env-file .env.docker up -d
            docker compose --env-file .env.docker ps

            for attempt in $(seq 1 20); do
              status=$(docker inspect --format='{{.State.Health.Status}}' dialearn-backend 2>/dev/null || true)
              if [ "$status" = "healthy" ]; then
                exit 0
              fi

              if [ "$status" = "unhealthy" ]; then
                docker logs --tail 100 dialearn-backend
                exit 1
              fi

              sleep 5
            done

            docker logs --tail 100 dialearn-backend
            exit 1

      - name: Slack notify success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<EOF
          {
            "text": "[Dialearn] Deploy succeeded\n- Workflow: ${{ github.workflow }}\n- Branch: ${{ github.ref_name }}\n- Commit: ${{ github.sha }}\n- Repo: ${{ github.repository }}\n- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )
          curl -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Slack notify failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<EOF
          {
            "text": "[Dialearn] Deploy failed\n- Workflow: ${{ github.workflow }}\n- Branch: ${{ github.ref_name }}\n- Commit: ${{ github.sha }}\n- Repo: ${{ github.repository }}\n- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )
          curl -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
